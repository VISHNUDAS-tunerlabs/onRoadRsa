<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <!-- Shield body -->
  <path
    d="M 50 8 L 86 21 L 86 58 C 86 78 69 92 50 97 C 31 92 14 78 14 58 L 14 21 Z"
    fill="#0C0C0C"
    stroke="#FBBF24"
    stroke-width="3.5"
    stroke-linejoin="round"
  />
  <!-- Road: perspective trapezoid (wide at bottom, narrows to vanishing point) -->
  <path d="M 30 86 L 44 33 L 56 33 L 70 86 Z" fill="#FBBF24"/>
  <!-- Centre line dashes — decrease in size toward vanishing point -->
  <rect x="48.5"  y="74" width="3"   height="8" rx="1.5"  fill="#0C0C0C"/>
  <rect x="48.75" y="62" width="2.5" height="6" rx="1.25" fill="#0C0C0C"/>
  <rect x="49"    y="51" width="2"   height="5" rx="1"    fill="#0C0C0C"/>
  <rect x="49.25" y="42" width="1.5" height="4" rx="0.75" fill="#0C0C0C"/>
</svg>
